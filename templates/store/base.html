<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Do'kon{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .product-card { transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .cart-badge { background: #dc3545; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛒 E-Do'kon</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Mahsulotlar</a>
            <a class="nav-link" href="/cart/">
                Savatcha <span class="badge cart-badge" id="cart-count">0</span>
            </a>
            <a class="nav-link" href="#" id="auth-link">Kirish</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = '';
const token = localStorage.getItem('access_token');
if (token) {
    document.getElementById('auth-link').textContent = 'Chiqish';
    document.getElementById('auth-link').onclick = () => {
        localStorage.clear();
        location.reload();
    };
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
