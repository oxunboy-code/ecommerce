{% extends 'store/base.html' %}
{% block title %}Ro'yxatdan o'tish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Ro'yxatdan o'tish</h3>
                <div id="error-msg" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Parol</label>
                    <input type="password" id="password" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select id="role" class="form-select">
                        <option value="customer">Mijoz</option>
                        <option value="seller">Sotuvchi</option>
                    </select>
                </div>
                <button class="btn btn-success w-100" onclick="register()">Ro'yxatdan o'tish</button>
                <hr>
                <p class="text-center">Hisobingiz bormi? <a href="/login/">Kiring</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function register() {
    const res = await fetch('/api/users/register/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: document.getElementById('email').value,
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
        })
    });
    const data = await res.json();
    if (res.ok) {
        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);
        window.location.href = '/';
    } else {
        const err = document.getElementById('error-msg');
        err.textContent = JSON.stringify(data);
        err.classList.remove('d-none');
    }
}
</script>
{% endblock %}
